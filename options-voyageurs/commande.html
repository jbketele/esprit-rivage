<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esprit Rivage - Options de Voyage </title>
    <link rel="icon" type="image/x-icon" href="assets/imgs/vague-conciergerie.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Raleway:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/options.css">
    <link rel="stylesheet" href="/assets/css/commande.css">
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GE7YGPLYBY"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-GE7YGPLYBY');
</script>

<body>
    <header class="header-voyageurs">
        <div class="logo-container">
            <img src="/assets/imgs/logo-esprit-rivage.png" alt="Logo Esprit Rivage" class="logo">
        </div>
    </header>

    <section class="recap">
        <h1>Récapitulatif de votre commande</h1>
        <div id="recap-items"></div>
        <h2>Total : <span id="recap-total">0</span> €</h2>
    </section>

    <section class="client-info">
        <h2>Vos informations</h2>
        <form id="order-form">
            <input type="text" placeholder="Nom" required>
            <input type="text" placeholder="Prénom" required>
            <input type="text" placeholder="Titre de l'annonce" required>
            <textarea placeholder="Message pour la conciergerie"></textarea>
            <button type="button" onclick="pay()">Confirmer la commande</button>
        </form>
    </section>

    <footer class="footer-voyageurs">
        <p>© 2026 Esprit Rivage – Tous droits réservés | <a href="/mentions-legales">Mentions légales</a></p>
    </footer>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        function loadRecap() {

            const container = document.getElementById("recap-items");
            const totalEl = document.getElementById("recap-total");

            let total = 0;

            container.innerHTML = "";

            cart.forEach(item => {

                total += item.price;

                const div = document.createElement("div");
                div.classList.add("recap-item");

                div.innerHTML = `
            <span>${item.name}</span>
            <strong>${item.price} €</strong>
        `;

                container.appendChild(div);
            });

            totalEl.textContent = total;
        }

        loadRecap();
    </script>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="/stripe.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
