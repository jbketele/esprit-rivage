<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Esprit Rivage</title>
    <link rel="icon" type="image/x-icon" href="assets/imgs/vague-conciergerie.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Raleway:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/contact.css">
</head>

<body>
    <header id="header"></header>

    <section id="hero">
        <div class="container">
            <h1>Confiez votre bien</h1>
            <p>Un accompagnement sur mesure pour valoriser votre bien en toute sérénité.</p>
        </div>
    </section>

    <section id="contact">
        <div class="container">

            <!-- FORMULAIRE -->
            <form name="contact" method="POST" data-netlify="true" class="contact-form">
                <input type="hidden" name="form-name" value="contact">

                <div class="form-group">
                    <label>Nom / Prénom</label>
                    <input type="text" name="name" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>

                <div class="form-group">
                    <label>Téléphone (optionnel)</label>
                    <input type="tel" name="phone">
                </div>

                <div class="form-group">
                    <label>Vous êtes</label>
                    <select name="type" required>
                        <option value="">-- Choisir --</option>
                        <option value="proprietaire">Propriétaire</option>
                        <option value="voyageur">Voyageur</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Localisation du bien</label>
                    <input type="text" name="location" placeholder="Ex : Deauville...">
                </div>

                <div class="form-group">
                    <label>Type de logement</label>
                    <select name="property">
                        <option value="">-- Choisir --</option>
                        <option value="studio">Studio / T2</option>
                        <option value="t3">T3 / T4</option>
                        <option value="maison">Maison</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea name="message" rows="5" required></textarea>
                </div>

                <button type="submit" class="btn-primary">
                    Demander un devis
                </button>

                <p class="form-note">
                    Nous vous recontactons rapidement avec une proposition adaptée.
                </p>
            </form>


        </div>
    </section>

    <footer id="footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" u
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="/include.js"></script>
</body>

</html>
